# Rustfmt configuration for pqdos project
# This file pins the formatting rules to ensure consistency across all environments
# Documentation: https://rust-lang.github.io/rustfmt/

edition = "2021"

# Basic formatting options
max_width = 100
tab_spaces = 4
newline_style = "Unix"

# Import formatting
imports_granularity = "Crate"
group_imports = "StdExternalCrate"

# Brace style
brace_style = "SameLineWhere"

# Indent style
indent_style = "Block"

# Control brace style
control_brace_style = "AlwaysSameLine"

# Function argument formatting
fn_args_layout = "Compressed"
fn_call_width = 60
attr_fn_like_width = 70

# Struct formatting
struct_field_align_threshold = 20
enum_discrim_align_threshold = 20

# Chain formatting
chain_width = 60
chain_indent = "Visual"

# Comment formatting
comment_width = 80
wrap_comments = true
format_code_in_doc_comments = true

# Match formatting
match_arm_leading_pipes = "Always"
match_block_trailing_comma = true

# Trailing commas
trailing_comma = "Vertical"

# Blank lines
blank_lines_upper_bound = 1
blank_lines_lower_bound = 0

# Merge imports
merge_imports = true

# Force explicit abort
force_explicit_abort = true

# Normalize doc attributes
normalize_doc_attributes = true

# Normalize string prefixes
normalize_string_prefixes = true

# Reorder impl items
reorder_impl_items = true

# Spaces
spaces_around_ranges = false
space_before_colon = false
space_after_colon = true

# Visibility
hide_parse_errors = false
